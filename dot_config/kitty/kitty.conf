font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
background_opacity 0.80
background_blur 0
dynamic_background_opacity yes

font_size 12.0
window_padding_width 10

hide_window_decorations yes

# Phím tắt chỉnh size/fullscreen Kitty
map alt+enter toggle_fullscreen
map alt+f10 toggle_maximized

# ==============================================================================
# Monochromatic Blue Theme Colors (Defined Directly to prevent loading issues)
# ==============================================================================
foreground              #cdd6f4
background              #0f121d
selection_foreground    #0f121d
selection_background    #74c7ec

# Cursor colors
cursor                  #89b4fa
cursor_text_color       #0f121d

# URL underline color when hovering with mouse
url_color               #89b4fa

# Kitty window border colors
active_border_color     #89b4fa
inactive_border_color   #28324a
bell_border_color       #74c7ec

# Tab bar colors
active_tab_foreground   #0f121d
active_tab_background   #89b4fa
inactive_tab_foreground #cdd6f4
inactive_tab_background #1c233a
tab_bar_background      #0f121d

# The 16 terminal colors
# black (deep navy)
color0 #0f121d
color8 #28324a

# red -> steel blue (dark blue)
color1 #46577e
color9 #5c73a6

# green -> light blue (pastel blue)
color2  #5f87d7
color10 #89b4fa

# yellow -> sky blue
color3  #89dceb
color11 #74c7ec

# blue -> vibrant blue
color4  #2f65e6
color12 #6aa2fc

# magenta -> lavender blue
color5  #b4befe
color13 #a3b8ef

# cyan -> cyan blue
color6  #89dceb
color14 #94e2d5

# white -> cold white
color7  #cdd6f4
color15 #e2e8f0
